<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Models Guide — AI Token Index</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script src="data.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-dark: #B8860B;
            --green: #0ECB81;
            --red: #F6465D;
            --bg: #0B0E11;
            --bg-card: #1E2329;
            --border: #2B3139;
            --text: #EAECEF;
            --text-sub: #848E9C;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .header {
            background: #181A20;
            border-bottom: 1px solid var(--border);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: 800;
            font-size: 16px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .main-nav {
            display: flex;
            gap: 4px;
        }

        .main-nav a {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
            border-radius: 6px;
            transition: 0.2s;
        }

        .main-nav a:hover {
            color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
        }

        .main-nav a.active {
            color: var(--gold);
        }

        .hamburger {
            display: none;
            background: transparent;
            border: none;
            color: var(--gold);
            font-size: 24px;
            cursor: pointer;
        }

        .benefit-tag {
            display: inline-block;
            background: rgba(0, 210, 255, 0.1);
            color: var(--cyan);
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            border: 1px solid rgba(0, 210, 255, 0.2);
        }

        .buy-now-btn {
            display: block;
            width: 100%;
            background: var(--gold);
            color: black;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            margin-top: 24px;
            text-transform: uppercase;
            font-size: 13px;
            transition: 0.2s;
        }

        .buy-now-btn:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 24px;
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-sub);
            max-width: 700px;
            margin: 0 auto;
        }

        .model-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 60px;
        }

        .model-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            transition: 0.3s;
        }

        .model-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        .model-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .model-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            overflow: hidden;
            flex-shrink: 0;
        }

        .model-icon img {
            width: 60%;
            height: 60%;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .model-info h2 {
            font-size: 22px;
        }

        .model-info span {
            font-size: 14px;
            color: var(--text-sub);
        }

        .price-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .price-table th {
            text-align: left;
            font-size: 12px;
            color: var(--text-sub);
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .price-table td {
            padding: 12px 0;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .price-gold {
            color: var(--gold);
            font-weight: 700;
            font-family: 'JetBrains Mono';
        }

        .features {
            list-style: none;
            margin-top: 20px;
        }

        .features li {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .features li::before {
            content: '✓';
            color: var(--green);
            font-weight: 800;
        }

        footer {
            background: #181A20;
            border-top: 1px solid var(--border);
            padding: 40px 24px;
            text-align: center;
            color: var(--text-sub);
            font-size: 13px;
        }

        /* ===== MOBILE RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                padding: 0 15px;
            }

            .main-nav {
                position: fixed;
                top: 64px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 64px);
                background: var(--bg);
                flex-direction: column;
                align-items: center;
                padding-top: 40px;
                transition: 0.3s;
                z-index: 1000;
            }

            .main-nav.active {
                left: 0;
            }

            .hamburger {
                display: block;
            }

            .hero h1 {
                font-size: 32px;
            }

            .model-grid {
                grid-template-columns: 1fr;
            }

            .model-card {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="logo">
                <div class="logo-icon">Q</div>
                <span class="logo-text">AI TOKEN INDEX</span>
            </a>
        </div>
        <div class="header-right" style="display: flex; align-items: center; gap: 15px;">
            <nav class="main-nav" id="mainNav">
                <a href="index.html">Home</a>
                <a href="market.html">Market</a>
                <a href="ai-models.html" class="active">AI Models</a>
                <a href="https://9dpi.github.io/quantix-ai-core/index.html" target="_blank">Quantix AI</a>
                <a href="https://www.linkedin.com/in/cuongvq/" target="_blank">Contact</a>
            </nav>
            <button class="hamburger" onclick="toggleMenu()">☰</button>
        </div>
    </header>

    <div class="container">
        <section class="hero">
            <h1>AI Models <span style="color:var(--gold)">Comparison</span></h1>
            <p>In-depth analysis of costs and performance for the world's leading artificial intelligence models
                supported by the AI Token Index ecosystem.</p>
        </section>

        <div class="model-grid" id="modelGrid">
            <!-- Dynamically Rendered -->
        </div>
    </div>

    <footer>
        <p>© 2026 AI Token Index — Powered by <a href="https://9dpi.github.io/quantix-ai-core/index.html"
                target="_blank" style="color:var(--gold); font-weight:700;">Quantix AI Core</a></p>
        <script>
            function toggleMenu() {
                document.getElementById('mainNav').classList.toggle('active');
            }

            function renderModels() {
                const grid = document.getElementById('modelGrid');
                grid.innerHTML = AI_BENEFITS_DATA.map(item => {
                    const config = AI_PRICING[item.id] || AI_PRICING.GPT4O;
                    const isImage = config.icon.startsWith('http') || config.icon.startsWith('logos/');
                    const iconContent = isImage
                        ? `<img src="${config.icon}" alt="${config.name}">`
                        : config.icon;

                    return `
                        <div class="model-card">
                            <div class="model-header">
                                <div class="model-icon" style="border-color:${config.color}33">${iconContent}</div>
                                <div class="model-info">
                                    <h2>${item.model}</h2>
                                    <span>${item.provider.toUpperCase()} • v1.2 Release</span>
                                </div>
                            </div>
                            <p style="font-size: 14px; color: var(--text-sub); line-height: 1.6;">
                                ${item.benefit} Optimized for professional use cases and integration.
                            </p>
                            <table class="price-table">
                                <thead>
                                    <tr>
                                        <th>TOKEN TYPE</th>
                                        <th>PRICE PER 100K TOKENS</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>Input Tokens</td>
                                        <td class="price-gold">$${(config.input / 10).toFixed(3)}</td>
                                    </tr>
                                    <tr>
                                        <td>Output Tokens</td>
                                        <td class="price-gold">$${(config.output / 10).toFixed(3)}</td>
                                    </tr>
                                </tbody>
                            </table>
                            <div class="benefit-tag">🛡️ Licensed for Enterprise Use</div>
                            <ul class="features">
                                <li>Real-time automated pricing updates</li>
                                <li>High-priority API endpoint access</li>
                                <li>VFM Performance Score: ${item.vfm}</li>
                            </ul>
                            <a href="${item.buyUrl}" target="_blank" class="buy-now-btn">Access ${config.name} Now</a>
                        </div>
                    `;
                }).join('');
            }

            document.addEventListener('DOMContentLoaded', renderModels);
        </script>
</body>

</html>
