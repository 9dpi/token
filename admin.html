<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosystem Admin — Q Token</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="nft_data_model.js"></script>
    <style>
        :root {
            --bg: #0B0E11;
            --bg-card: #1E2329;
            --border: #2B3139;
            --text: #EAECEF;
            --text-sub: #848E9C;
            --gold: #D4AF37;
            --cyan: #00D2FF;
            --red: #F6465D;
            --green: #0ECB81;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
        }

        /* HEADER (Standardized) */
        .header {
            background: #181A20;
            border-bottom: 1px solid var(--border);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--gold), #B8860B);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-weight: 800;
            font-size: 16px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .main-nav { display: flex; gap: 4px; }

        .main-nav a {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sub);
            border-radius: 6px;
            transition: 0.2s;
            text-decoration: none;
        }

        .main-nav a:hover {
            color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
        }

        .main-nav a.active { color: var(--gold); }

        /* DASHBOARD */
        .admin-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .admin-badge {
            background: rgba(246, 70, 93, 0.1);
            color: var(--red);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            border: 1px solid rgba(246, 70, 93, 0.3);
        }

        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card .label {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .stat-card .value {
            font-size: 2.2rem;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: #FFF;
        }

        /* DATA TABLES */
        .data-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .data-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn-clear {
            background: rgba(246, 70, 93, 0.1);
            color: var(--red);
            border: 1px solid var(--red);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        
        .btn-clear:hover {
            background: var(--red);
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px 24px;
            color: var(--text-sub);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 15px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            font-size: 0.95rem;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .tx-type {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        
        .type-mint { background: rgba(14, 203, 129, 0.1); color: var(--green); }
        .type-burn { background: rgba(246, 70, 93, 0.1); color: var(--red); }
        .type-buy { background: rgba(0, 210, 255, 0.1); color: var(--cyan); }
    </style>
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="logo">
                <div class="logo-icon">Q</div>
                <span class="logo-text">AI TOKEN INDEX</span>
            </a>
        </div>
        <div class="header-right">
            <nav class="main-nav" id="mainNav">
                <a href="index.html">Home</a>
                <a href="market.html">NFT Market</a>
                <a href="ai-models.html">AI Models</a>
                <a href="wallet.html" style="color: var(--gold);">Q Wallet</a>
                <a href="admin.html" class="active">Admin</a>
            </nav>
        </div>
    </header>

    <main class="admin-container">
        <div class="page-title">
            Ecosystem Monitor <span class="admin-badge">SYSTEM ADMIN</span>
        </div>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Q Tokens (Circulating)</div>
                <div class="value" id="statTokens">0.00</div>
            </div>
            <div class="stat-card">
                <div class="label">Total Minted NFTs</div>
                <div class="value" id="statNFTs">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Total Users</div>
                <div class="value" id="statUsers">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Total Transactions</div>
                <div class="value" id="statTx">0</div>
            </div>
        </div>

        <!-- USERS TABLE -->
        <div class="data-section">
            <div class="data-header">User Accounts</div>
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Username</th>
                        <th>Wallet Address</th>
                        <th>Q Balance</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    <!-- Rendered by JS -->
                </tbody>
            </table>
        </div>

        <!-- TRANSACTIONS TABLE -->
        <div class="data-section">
            <div class="data-header">
                System Transactions
                <button class="btn-clear" onclick="clearDB()">Clear Database (Reset)</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>TX ID</th>
                        <th>Type</th>
                        <th>User</th>
                        <th>Amount</th>
                        <th>Related NFT</th>
                    </tr>
                </thead>
                <tbody id="txTable">
                    <!-- Rendered by JS -->
                </tbody>
            </table>
        </div>

    </main>

    <script>
        function renderAdmin() {
            if (!window.NFTDatabase) return;
            const DB = window.NFTDatabase;

            // 1. Render Stats
            const totalQ = DB.users.reduce((sum, u) => sum + u.q_balance, 0);
            document.getElementById('statTokens').innerText = totalQ.toFixed(2);
            document.getElementById('statNFTs').innerText = DB.nfts.length;
            document.getElementById('statUsers').innerText = DB.users.length;
            document.getElementById('statTx').innerText = DB.transactions.length;

            // 2. Render Users
            const uTable = document.getElementById('usersTable');
            uTable.innerHTML = DB.users.map(u => `
                <tr>
                    <td class="mono" style="color:var(--text-sub)">${u.id}</td>
                    <td style="font-weight:700;">@${u.username}</td>
                    <td class="mono" style="color:var(--gold)">${u.wallet_address}</td>
                    <td class="mono" style="font-size:1.1rem">${u.q_balance.toFixed(2)} Q</td>
                </tr>
            `).join('');

            // 3. Render Transactions
            const txTable = document.getElementById('txTable');
            // Sort tx by newest first
            const sortedTx = [...DB.transactions].reverse();
            txTable.innerHTML = sortedTx.map(tx => {
                let typeClass = 'type-buy';
                if(tx.type === 'MINT_NFT') typeClass = 'type-mint';
                if(tx.type === 'BURN_NFT') typeClass = 'type-burn';
                
                const time = new Date(tx.timestamp).toLocaleTimeString();
                
                return `
                <tr>
                    <td style="color:var(--text-sub)">${time}</td>
                    <td class="mono">${tx.id}</td>
                    <td><span class="tx-type ${typeClass}">${tx.type}</span></td>
                    <td style="font-weight:700;">${tx.to || tx.user_id}</td>
                    <td class="mono" style="color:var(--gold)">${tx.amount_q > 0 ? '+'+tx.amount_q.toFixed(2) : '—'}</td>
                    <td class="mono" style="color:var(--text-sub)">${tx.nft_id || '—'}</td>
                </tr>
            `}).join('');
        }

        function clearDB() {
            if(confirm("DANGER: Are you sure you want to completely reset the LocalStorage Database? All mock data will be wiped.")) {
                localStorage.removeItem('NFT_DB');
                alert("Database wiped. Refreshing page...");
                location.reload();
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', renderAdmin);
    </script>
</body>
</html>
