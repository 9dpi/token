<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT & Q Token - Console Test (Phase 2)</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0B0E11;
            color: #E2E8F0;
            padding: 40px;
            margin: 0;
        }
        h1 { color: #D4AF37; font-weight: 300; }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1A1F24;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        button {
            background-color: #D4AF37;
            color: #0B0E11;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #F1C40F;
            transform: scale(1.05);
        }
        .log-box {
            margin-top: 20px;
            background-color: #000;
            padding: 15px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            height: 400px;
            overflow-y: auto;
            border: 1px solid #444;
            white-space: pre-wrap;
        }
        .success { color: #10A37F; }
        .error { color: #FD5339; }
        .info { color: #4285F4; }
        .reward { color: #D4AF37; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛠️ Giai đoạn: Tuần 1-2 (Thiết kế DB & Thuật toán Mint)</h1>
        <p>Bấm nút bên dưới để mô phỏng quá trình định giá và Mint 10 file dữ liệu mẫu thành NFT, đồng thời thưởng Q Token cho User theo công thức mới.</p>
        
        <button id="runTestBtn">Chạy thử nghiệm Mint 10 File (Mock Data)</button>

        <div class="log-box" id="logBox">
// Chờ lệnh thực thi...
        </div>
    </div>

    <!-- Nạp thư viện Data Model vừa tạo -->
    <script src="nft_data_model.js"></script>

    <script>
        const logBox = document.getElementById('logBox');
        
        // Ghi đè hàm console.log để hiển thị lên màn hình
        const originalLog = console.log;
        const originalError = console.error;

        function appendLog(msg, type = 'normal') {
            let className = '';
            if (msg.includes('✅')) className = 'success';
            if (msg.includes('❌')) className = 'error';
            if (msg.includes('💰')) className = 'reward';
            if (msg.includes('===')) className = 'info';

            logBox.innerHTML += `<div class="${className}">${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        console.log = function(...args) {
            const msg = args.join(' ');
            appendLog(msg);
            originalLog.apply(console, args);
        };

        console.error = function(...args) {
            const msg = args.join(' ');
            appendLog(`❌ Error: ${msg}`, 'error');
            originalError.apply(console, args);
        };

        document.getElementById('runTestBtn').addEventListener('click', () => {
            logBox.innerHTML = ''; // Clear log
            // Gọi hàm đã định nghĩa trong nft_data_model.js
            if(typeof runTestCases === 'function') {
                runTestCases();
            } else {
                console.error("Không tìm thấy hàm runTestCases. Vui lòng kiểm tra file nft_data_model.js");
            }
        });
    </script>
</body>
</html>
